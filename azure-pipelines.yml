trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: Docker@2
  displayName: Login to ACR
  inputs:
    command: login
    containerRegistry: 'project5-acr-connection'

- script: |
    docker buildx create --use
    docker buildx build \
      --platform linux/arm64 \
      -t project5acraiswarya.azurecr.io/project5-app:1 \
      --push .
  displayName: Build and Push ARM64 Image
